<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Downloader JS</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; }
        button { background: #bd081c; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        .result { margin-top: 20px; padding: 10px; background: #f9f9f9; border-radius: 5px; display: none; }
        img, video { max-width: 100%; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #bd081c;">Pinterest Downloader (JS)</h2>
    <input type="url" id="pinterestUrl" placeholder="Tempel link Pinterest di sini">
    <button onclick="fetchMedia()">Ambil Media</button>

    <div id="result" class="result">
        </div>
</div>

<script>
async function fetchMedia() {
    const urlInput = document.getElementById('pinterestUrl').value;
    const resultDiv = document.getElementById('result');
    
    if (!urlInput) return alert('Masukkan URL terlebih dahulu!');
    
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = 'Sedang memproses...';

    // Menggunakan public CORS proxy gratis untuk menjembatani request browser
    const proxyUrl = 'https://api.allorigins.win/get?url=';
    
    try {
        const response = await fetch(proxyUrl + encodeURIComponent(urlInput));
        const data = await response.json();
        const html = data.contents; // Mengambil string HTML halaman Pinterest

        // Regex untuk mencari Video atau Foto
        const videoRegex = /"video_list".*?"url":"(https:\/\/v1\.pinimg\.com\/videos\/.*?\.mp4)"/;
        const imageRegex = /"(https:\/\/i\.pinimg\.com\/(?:originals|736x)\/.*?\.jpg)"/;

        const videoMatch = html.match(videoRegex);
        const imageMatch = html.match(imageRegex);

        if (videoMatch) {
            const videoUrl = videoMatch[1].replace(/\\/g, '');
            resultDiv.innerHTML = `
                <h4>Video Ditemukan!</h4>
                <video src="${videoUrl}" controls></video>
                <br><br>
                <a href="${videoUrl}" target="_blank" style="background: green; color:white; padding:8px; text-decoration:none; border-radius:4px;">Buka Video</a>
            `;
        } else if (imageMatch) {
            const imageUrl = imageMatch[1].replace(/"/g, '');
            resultDiv.innerHTML = `
                <h4>Foto Ditemukan!</h4>
                <img src="${imageUrl}" />
                <br><br>
                <a href="${imageUrl}" target="_blank" style="background: green; color:white; padding:8px; text-decoration:none; border-radius:4px;">Buka Gambar</a>
            `;
        } else {
            resultDiv.innerHTML = '<span style="color:red;">Gagal menemukan media. Coba link yang lain.</span>';
        }
    } catch (error) {
        resultDiv.innerHTML = '<span style="color:red;">Terjadi kesalahan koneksi atau proxy down.</span>';
    }
}
</script>
</body>
</html>
